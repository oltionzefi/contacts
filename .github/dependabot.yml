---
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    assignees:
      - oltionzefi
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope
    groups:
      major-updates:
        update-types:
          - major
      minor-and-patch:
        update-types:
          - minor
          - patch
